// Get all elements with the class 'draggable'
const draggableElements = document.querySelectorAll('.debug');

// Initialize variables to store mouse position and drag state for each element
let offsetXArray = [], offsetYArray = [], isDraggingArray = [];

// Function to handle mouse down event for a specific element
function handleMouseDown(event, index) {
    // Calculate the offset between the mouse position and the top-left corner of the draggable element
    offsetXArray[index] = event.clientX - draggableElements[index].getBoundingClientRect().left;
    offsetYArray[index] = event.clientY - draggableElements[index].getBoundingClientRect().top;

    // Set the drag state to true
    isDraggingArray[index] = true;

    // Add event listeners for mouse move and mouse up events
    document.addEventListener('mousemove', handleMouseMove);
    document.addEventListener('mouseup', handleMouseUp);
}

// Function to handle mouse move event for a specific element
function handleMouseMove(event) {
    for (let i = 0; i < draggableElements.length; i++) {
        if (isDraggingArray[i]) {
            // Calculate the new position of the draggable element based on the mouse position and offset
            const newX = event.clientX - offsetXArray[i] + window.pageXOffset;
            const newY = event.clientY - offsetYArray[i] + window.pageYOffset;

            // Set the new position of the draggable element
            draggableElements[i].style.left = newX + 'px';
            draggableElements[i].style.top = newY + 'px';
        }
    }
}

// Function to handle mouse up event for a specific element
function handleMouseUp() {
    // Set the drag state to false for all elements
    isDraggingArray.fill(false);

    // Remove event listeners for mouse move and mouse up events
    document.removeEventListener('mousemove', handleMouseMove);
    document.removeEventListener('mouseup', handleMouseUp);
}

// Add event listeners for mouse down event on each draggable element
draggableElements.forEach((element, index) => {
    element.addEventListener('mousedown', (event) => handleMouseDown(event, index));
});


function debug_toggle() {

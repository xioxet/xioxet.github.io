<script>
    // Function to fetch CSV file and convert to JSON
function fetchCSVAndConvertToJSON(csvFile) {
    return fetch(csvFile)
        .then(response => response.text())
        .then(csvText => {
            // Split CSV text into lines
            const lines = csvText.split('\n');
            
            // Get column headers from the first line
            const headers = lines[0].split(',');

            // Initialize array to store JSON data
            const jsonData = [];

            // Parse remaining lines into JSON objects
            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(',');
                const obj = {};
                for (let j = 0; j < headers.length; j++) {
                    obj[headers[j]] = values[j];
                }
                jsonData.push(obj);
            }

            return jsonData;
        });
}

const csvFile = 'worldcities.csv';  // Replace with the path to your CSV file
fetchCSVAndConvertToJSON(csvFile)
    .then(data => {
        console.log('CSV data:', data);
    })
    .catch(error => {
        console.error('Error fetching CSV:', error);
    });

console.log(data)
</script>

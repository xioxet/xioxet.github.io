        var quiz_started = false;
        var question_num = 1;
        var picked_qns = [];
        var ind = 0;
        var score = 0;
        var current_question;
        var submitted = false;

        var title = document.getElementById('question-title');
        var q_answer = document.getElementById('question-answer');
        var next_button = document.getElementById('next-button');
        var q_body = document.getElementById('question-body');
        var q_number = document.getElementById('question-number');
        var q_link = document.getElementById('question-link');
        var q_complete = document.getElementById('quiz-complete');
        var s_span = document.getElementById('complete-str')

        function resetVars() {
            quiz_started = false;
            question_num = 1;
            picked_qns = [];
            ind = 0;
            score = 0;
            current_question;
            submitted = false;
            q_body.style.backgroundColor = "#EEEEEE";
            q_complete.style.display = "none";
            q_answer.style.display = "none";
            next_button.style.display = "none";
            q_link.style.display = "none";
        }

        function startQuiz() {
            resetVars();
            if (!quiz_started) {
                quiz_started = true;
                var question_body = document.getElementById('question-body')
                question_body.style.display = "block";
                getQuestion();
                setQuestion();
            }
        }
        
        function getQuestion() {
            if (picked_qns.length == questions.length) {return;}
            while (true) {
                ind = Math.floor((Math.random() * questions.length));
                console.log(ind);
                if (!picked_qns.includes(ind)) {break;}
            }
            picked_qns.push(ind);
            current_question = questions[ind];
        }

        function setQuestion() {
            title.innerHTML = current_question.title;
            q_number.innerHTML = `question ${question_num}`
        }

        function submitQuestion(answer) {
            if (!submitted) {
                submitted = true;
                console.log(answer);
                var ans_text = ""
                title.style.fontWeight = "bold";
                if (current_question.answer == answer) {
                    q_body.style.backgroundColor = '#daf5d0';
                    ans_text += "You were correct! ";
                    score++;
                }
                else {
                    q_body.style.backgroundColor = '#ffc4c4';
                    ans_text += "You were wrong! ";
                }
                var s_title = current_question.title;
                var s_artist = current_question.artist;
                var s_album = current_question.album;

                if (s_album != 'none') {
                    ans_text += `${s_title} is a song by ${s_artist} on the album ${s_album}.`
                } else {ans_text += `${s_title} is a song by ${s_artist}.`}
                q_answer.innerHTML = ans_text;
                q_answer.style.display = "block";
                q_link.src = current_question.link;
                q_link.style.display = "block";
                next_button.style.display = "block";
            }
        }

        function nextQuestion() {
            question_num++;
            if (question_num <= 10) {
                getQuestion();
                setQuestion();
                q_answer.style.display = "none";
                next_button.style.display = "none";
                q_body.style.backgroundColor = "#EEEEEE";
                q_link.style.display = "none";
                submitted = false;
            } else {
                q_body.style.display = "none";
                q_complete.style.display = "block";
                s_span.innerHTML = `You scored a total of ${score} out of 10! Click the button above to have another round.`
                quiz_started = false;
            }
        }

<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>nope</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <style>

            body {
                background-image: url('media/blackstatic.gif');
                font-family:'Times New Roman';
                perspective:10cm;
            }

            .staticrypt-hr {
                margin-top: 20px;
                margin-bottom: 20px;
                border: 0;
                border-top: 1px solid green;
            }

            .staticrypt-page {
                width: 360px;
                padding: 8% 0 0;
                margin: auto;
                box-sizing: border-box;
                perspective: 20cm;
            }

            .staticrypt-form {
                position: relative;
                z-index: 1;
                background-image:url('media/futaba/allmessed.gif');
                max-width: 360px;
                margin: 0 auto 100px;
                padding: 45px;
                text-align: center;
                transform:  rotateX(30deg) rotateY(10deg);
                transform-style: preserve-3d;
            }

            .staticrypt-form input[type="password"],
            input[type="text"] {
                background: inherit;
                border: 0;
                box-sizing: border-box; /* This ensures padding is included in the total width */
                font-size: 14px;
                outline: 0;
                padding: 15px 30px 15px 15px; /* Adjust the padding to ensure there is space for the icon */
                width: 100%;
            }

            .staticrypt-password-container {
                outline: 0;
                width: 100%;
                border: 0;
                margin: 0 0 15px;
                box-sizing: border-box;
                font-family:'Consolas';
                cursor: pointer;
            }

            #staticrypt-password {
                font-family:'Consolas';
                background-color:black;
                color: white;
            }

            #staticrypt-password:hover,
            #staticrypt-password:active,
            #staticrypt-password:focus {
                outline: 2px solid red;
                background-image:url('media/blackstatic.gif');
                color: white;
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 20px;
                opacity: 60%;
                padding: 13px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                width: 20px;
            }

            .staticrypt-form .staticrypt-decrypt-button {
                outline: 0;
                background-color: white;
                width: 100%;
                border: 0;
                padding: 5px;
                color: red;
                font-size: 15px;
                font-family: 'Courier';
                cursor: pointer;
                pointer-events:auto;
                margin-top:20px;
                width:fit-content;
            }

            input {
                pointer-events: auto;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover
             {
                background-image:url('media/blackmilk.gif');
                outline: 2px solid red;
                filter: brightness(92%);
            }

            .staticrypt-html {
                height: 100%;
            }

            .staticrypt-body {
                height: 100%;
                margin: 0;
            }

            .staticrypt-content {
                position: relative;
                height: 100%;
                margin-bottom: 1em;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .staticrypt-instructions {
                margin-top: -1em;
                margin-bottom: 1em;
            }

            .staticrypt-title {
                font-size: 1.5em;
                color:white;
                background-color:black;
                padding:5px;
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin-bottom: 1em;
            }

            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.5);
                margin-right: 1em;
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                vertical-align: text-bottom;
                border: 0.25em solid gray;
                border-right-color: transparent;
                border-radius: 50%;
                -webkit-animation: spinner-border 0.75s linear infinite;
                animation: spinner-border 0.75s linear infinite;
                animation-duration: 0.75s;
                animation-timing-function: linear;
                animation-delay: 0s;
                animation-iteration-count: infinite;
                animation-direction: normal;
                animation-fill-mode: none;
                animation-play-state: running;
                animation-name: spinner-border;
            }

            @keyframes spinner-border {
                100% {
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>

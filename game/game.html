<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>griddle</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/x-icon" href="../media/icon.png">
</head>
<body>
    <header>↤ griddle ↦</header>
    <navbar>
        <a href='../index.html'><h1>↤ back to main ↦</h1></a>
    </navbar>
    <hr>
    <div class="game-bio">
        the goal of this game is to find english words that contain the substrings that show up in the grid. see how long you can last before the entire grid fills up.
        <br><button class="quiz-button" onclick="toggle_options()">click here for options</button>
        <div id="options">
            <span id="initial-delay-value">initial-delay-value = 2000</span>
            <input type="range" min="2000" max="10000" value="2000" class="slider game-options" id="initial-delay" oninput="slider_update('initial-delay-value', 'initial-delay')">
            <span id="speedup-delay-value">speedup-delay-value = 2000</span>
            <input type="range" min="2000" max="10000" value="2000" class="slider game-options" id="speedup-delay" oninput="slider_update('speedup-delay-value', 'speedup-delay')">
        </div>
        <hr>
        <span id="loading">loading..</span>
        <button id="game-button" class="g-button" onclick="set_game()">click here to begin</button>  
    </div>
    <div id="game">
        <div id="ending">game over!</div>
        <ul id="word-history"></ul>
        <div id="score">score: 0</div>
        <div id="cell-board">
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
        </div>
        <a name='input'><input type="text" id="game-input" onkeyup="update_on_press()"></a>
        <button id="game-submit" onclick="submit()">submit</button>
        <div id="game-text"></div>
    </div>
</body>
<script src="game.js"></script>
</html>
